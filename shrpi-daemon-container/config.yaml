name: SH Rpi Daemon for Sailor HAT
slug: sh_rpi_daemon
version: "0.5.0"
description: >
  Safely shuts down Home Assistant when power is lost — fast enough to complete before supercapacitors drain. Uses direct dbus PowerOff for reliable filesystem protection.
url: https://github.com/eburi/ha_addon_sh_rpi_daemon
image: ghcr.io/eburi/ha_addon_sh_rpi_daemon/{arch}

arch:
  - aarch64

init: false
startup: services
hassio_api: true
hassio_role: manager
homeassistant_api: true
host_dbus: true

devices:
  - /dev/i2c-1
  - /dev/i2c/1
